data:
  squad_sample_size: 800
  hotpotqa_sample_size: 200
  random_seed: 42

chunking:
  strategies:
    - name: "fixed_256"
      chunk_size: 256
      chunk_overlap: 50
    - name: "fixed_512"
      chunk_size: 512
      chunk_overlap: 100
    - name: "recursive_512"
      chunk_size: 512
      chunk_overlap: 100
      separators: ["\n\n", "\n", ". ", " "]

embedding:
  models:
    - name: "all-MiniLM-L6-v2"
      dimension: 384
    - name: "BAAI/bge-small-en-v1.5"
      dimension: 384

retrieval:
  top_k: 5
  bm25_weight: 0.5
  dense_weight: 0.5

reranker:
  use_reranker: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n: 3

generation:
  primary_model: "qwen2.5:latest"
  baseline_model: "phi3:latest"
  temperature: 0.1
  max_tokens: 256
  ollama_base_url: "http://localhost:11434"

evaluation:
  metrics: ["exact_match", "f1", "rouge_l", "hit_rate", "mrr"]
  retrieval_k_values: [1, 3, 5, 10]
